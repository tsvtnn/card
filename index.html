<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tsvetan Nedelchev</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="profile-wrapper">
      <div class="profile-group">
        <img src="avatar.png" alt="Avatar" class="avatar">
        <div class="info">
          <div class="name-row">
            <h1>Tsvetan Nedelchev</h1>
            <span class="nickname">/ Tan</span>
            <button id="theme-toggle" class="toggle-inline">
                <i data-lucide="sun" class="icon icon-sun"></i>
                <i data-lucide="moon" class="icon icon-moon"></i>
              </button>
          </div>
          <p class="location">
            <i data-lucide="map-pin" class="location-icon"></i>
            United Kingdom
          </p>    
        </div>
      </div>
      <div class="links">
        <a href="https://www.linkedin.com/in/tsvetannedelchev/"><i data-lucide="linkedin"></i></a>
        <a href="https://www.instagram.com/nedelcheev/"><i data-lucide="instagram"></i></a>
        <a href="mailto:tsvetannedelchev@gmail.com"><i data-lucide="mail"></i></a>
      </div>      
    </div>
  </div>
  <script src="script.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
